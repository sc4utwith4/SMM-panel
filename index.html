<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel SMM — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">⚡</span>
      <h1>spirasocial</h1>
      <p>Impulsione suas redes sociais</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Entrar</button>
      <button class="tab-btn" data-tab="register">Cadastrar</button>
    </div>

    <form id="loginForm" class="auth-form active">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" required />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="form-error hidden"></div>
      <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
    </form>

    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="regName" placeholder="Seu nome" required />
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="regEmail" placeholder="seu@email.com" required />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
      </div>
      <div id="registerError" class="form-error hidden"></div>
      <button type="submit" class="btn-primary" id="registerBtn">Criar conta</button>
    </form>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
